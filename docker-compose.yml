services:
  backend:
    build:
      context: ./panda-web-app-backend
    ports:
      - '3000:3000'
    env_file:
      - ./.env

  frontend:
    build:
      context: ./panda-web-app-frontend
    ports:
      - '8080:80'
    env_file:
      - ./.env

  nginx:
    image: nginx:latest  # Use the latest official Nginx image
    ports:
      - "80:80"  # Expose on port 80 (public no port needed to be specified [e.g. http://localhost])
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf  # Mount custom config
    depends_on:
      - frontend
      - backend
